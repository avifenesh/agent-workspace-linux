[package]
name = "agent-workspace-linux"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Isolated Linux desktop workspaces for AI agents."

[dependencies]
anyhow = "1.0"
rmcp = { version = "1.5.0", features = ["transport-io"] }
schemars = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.51", features = ["macros", "rt"] }
