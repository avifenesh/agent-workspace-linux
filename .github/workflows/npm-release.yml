name: Publish npm package

# Runs AFTER the GitHub Release is published (and its binary assets uploaded).
# If triggered on `released` (not `published`) it could fire before assets are
# attached by the release workflow — `published` is the safest trigger.
#
# Required secret: NPM_TOKEN
#   Go to https://www.npmjs.com/settings/<username>/tokens, create an
#   "Automation" granular token scoped to the `agent-workspace-linux` package,
#   then add it as a repository secret named NPM_TOKEN at:
#   https://github.com/avifenesh/agent-workspace-linux/settings/secrets/actions

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0) — used in workflow_dispatch only"
        required: true

permissions:
  contents: read
  id-token: write  # required for --provenance (npm publish with OIDC attestation)

jobs:
  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Derive the version string from the trigger.
      # `release` events: use github.event.release.tag_name (strip leading "v").
      # `workflow_dispatch`: use the `tag` input (also strip "v").
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RAW_TAG="${{ github.event.release.tag_name }}"
          else
            RAW_TAG="${{ github.event.inputs.tag }}"
          fi
          VERSION="${RAW_TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION (tag: $RAW_TAG)"

      # Stamp the version into package.json before publishing.
      # --no-git-tag-version: don't create a git tag (we already have one).
      # --allow-same-version: idempotent if the workflow re-runs on the same tag.
      - name: Set package version
        working-directory: npm
        run: |
          npm version "${{ steps.version.outputs.version }}" \
            --no-git-tag-version \
            --allow-same-version

      - name: Publish to npm
        working-directory: npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
