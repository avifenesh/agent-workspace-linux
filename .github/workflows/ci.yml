name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  rust:
    name: Rust and script checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bubblewrap \
            imagemagick \
            libfontconfig1-dev \
            libssl-dev \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-util-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            openbox \
            pkg-config \
            x11-utils \
            xauth \
            xclip \
            xdotool \
            xvfb

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Build
        run: cargo build --locked

      - name: Clippy
        run: cargo clippy --locked -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: JavaScript syntax
        run: |
          for file in scripts/*.js; do
            node --check "$file"
          done

      - name: Python syntax
        run: python3 -m py_compile scripts/*.py

      - name: Whitespace
        run: git diff --check
